<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Table overlay layout fixture</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/table-session.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #0a0e18;
      }
      body.table-play-active {
        overflow: hidden;
      }
    </style>
  </head>
  <body class="table-play-active">
    <div id="table-play-overlay" class="table-play-overlay">
      <header class="table-play-overlay__bar">
        <button type="button" id="close-table-play">← Hand results</button>
        <span class="table-play-overlay__title">Hand #1 · live table</span>
      </header>
      <main class="table-play-overlay__main">
        <div id="table-session-root" class="table-session-root" data-testid="overlay-fixture-root"></div>
      </main>
    </div>
    <script type="module">
      import { mountTableSession } from "/table-session.js";

      const params = new URLSearchParams(window.location.search);
      const playerCount = Math.min(8, Math.max(2, parseInt(params.get("players") || "4", 10)));
      const botCount = Math.min(
        playerCount - 1,
        Math.max(0, parseInt(params.get("bots") || "1", 10)),
      );
      const phase = params.get("phase") || "draw";
      const enrollmentMode = phase === "enrollment";

      const ids = Array.from({ length: playerCount }, (_, i) => `p${i}`);
      const dealerId = ids[playerCount - 1];

      const state = {
        selfJoined: false,
        actionFeedback: null,
      };

      function isBot(id) {
        const idx = parseInt(id.slice(1), 10);
        return idx > 0 && idx <= botCount;
      }

      function displayName(id) {
        const idx = parseInt(id.slice(1), 10);
        return isBot(id) ? `Bot ${idx}` : `Player ${idx}`;
      }

      function buildPlayers() {
        return ids.map((id) => {
          const isSelf = id === "p0";
          const inHand = enrollmentMode ? state.selfJoined && isSelf : true;
          return {
            playerId: id,
            displayName: displayName(id),
            handsWon: 0,
            inHand,
            tricksThisHand: 0,
            isSelf,
            isDealer: id === dealerId,
            isLeading: false,
            isWinner: false,
            isRobot: isBot(id),
            enrollmentOnClock: enrollmentMode && isSelf && !state.selfJoined,
            enrollmentJoined: enrollmentMode && isSelf && state.selfJoined,
            enrollmentSatOut: false,
            canToggleInHand: enrollmentMode && isSelf && !state.selfJoined,
            canEditTricks: false,
            showHoleCards: phase === "play" && id !== "p0",
            holeCardCount: phase === "play" ? 4 : 0,
            isOnTurn: phase === "draw" && id === "p0",
            enrollmentSecondsOnClock: enrollmentMode && isSelf && !state.selfJoined ? 18 : undefined,
            enrollmentTimeLeft:
              enrollmentMode && isSelf && !state.selfJoined ? 0.72 : undefined,
          };
        });
      }

      const heroCards =
        phase === "draw" || phase === "play"
          ? [
              { rank: "A", suit: "spades" },
              { rank: "K", suit: "hearts" },
              { rank: "Q", suit: "diamonds" },
              { rank: "J", suit: "clubs" },
              { rank: "10", suit: "spades" },
            ]
          : [];

      const root = document.getElementById("table-session-root");

      function renderFixture() {
        mountTableSession(root, {
          session: {
            sessionId: "overlay-fixture",
            handNumber: 1,
            handStake: 1,
            carryOverPot: 0,
            isFinal: false,
            dealerId,
            participantIds: ids,
            tricksByPlayer: {},
            phase: enrollmentMode ? "waiting" : phase,
            trumpSuit: enrollmentMode ? null : "hearts",
            trumpUpcard: enrollmentMode ? null : { rank: "7", suit: "hearts" },
            turnPlayerId: enrollmentMode ? null : "p0",
            remainingDeckCount: enrollmentMode ? null : 28,
            maxDrawDiscards: 4,
            handEnrollment: enrollmentMode
              ? {
                  active: true,
                  orderedPlayerIds: ids,
                  enrolledIds: state.selfJoined ? ["p0"] : [],
                  declinedIds: [],
                  currentIndex: state.selfJoined ? 1 : 0,
                }
              : null,
          },
          players: buildPlayers(),
          potMetrics: {
            anteAmount: 1,
            potCap: 20,
            currentPot: playerCount,
            maxWinThisHand: playerCount,
            limEnabled: false,
            overflow: 0,
          },
          mySessionNet: 0,
          myHandContribution: 1,
          leaderLabel: enrollmentMode
            ? state.selfJoined
              ? "Waiting for other players to join"
              : "Your turn — tap I'm in (18s)"
            : "Trump Hearts · draw round",
          showCoWinSettlement: false,
          enrollmentActive: enrollmentMode,
          enrollmentSecondsLeft: 18,
          currentUserId: "p0",
          heroCards: enrollmentMode ? [] : heroCards,
          privateHandReady: !enrollmentMode,
          legalPlayIndices: null,
          actionFeedback: state.actionFeedback,
          actions: {
            onToggleInHand: (inHand) => {
              if (!enrollmentMode || !inHand) return;
              state.selfJoined = true;
              state.actionFeedback = {
                status: "success",
                message: "You're in this hand.",
              };
              renderFixture();
            },
            onTrickDelta: () => {},
            onSettle: () => {},
            onSubmitDraw: async () => {},
            onPassDraw: async () => {},
            onPlayCard: async () => {},
          },
        });
      }

      renderFixture();
    </script>
  </body>
</html>
