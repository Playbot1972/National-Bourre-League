name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Check Firebase secrets are configured
        id: cfg
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Firebase secrets not configured — deploy skipped. Add FIREBASE_PROJECT_ID (and other secrets) at Settings → Secrets → Actions, or run npm run deploy locally."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.cfg.outputs.ready == 'true'
        run: npm ci

      - name: Bump app version
        if: steps.cfg.outputs.ready == 'true'
        id: version
        run: |
          node scripts/bump-version.js
          echo "version=$(node -p "JSON.parse(require('fs').readFileSync('version.json','utf8')).version")" >> "$GITHUB_OUTPUT"

      - name: Write production Firebase config
        if: steps.cfg.outputs.ready == 'true'
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: node scripts/write-firebase-config.js

      - name: Build hosting bundle
        if: steps.cfg.outputs.ready == 'true'
        run: npm run build:hosting

      - name: Authenticate to Google Cloud
        if: steps.cfg.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting + Firestore rules
        if: steps.cfg.outputs.ready == 'true'
        run: npx firebase deploy --only hosting,firestore:rules --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Commit version bump
        if: steps.cfg.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json package.json docs/version.js src/version.ts
          git diff --staged --quiet && exit 0
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push
