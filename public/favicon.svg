<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="Booray logo">
  <defs>
    <linearGradient id="cream" x1="512" y1="170" x2="512" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#faf6ee"/>
      <stop offset="1" stop-color="#e8dfd0"/>
    </linearGradient>
    <linearGradient id="textTop" x1="512" y1="748" x2="512" y2="812" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="textBottom" x1="512" y1="812" x2="512" y2="876" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4a853"/>
      <stop offset="1" stop-color="#a67c2a"/>
    </linearGradient>
    <pattern id="cardHatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#10131c" stroke-opacity="0.07" stroke-width="2"/>
    </pattern>
    <g id="ornate-spade">
      <path fill="#10131c" d="M0 -42c-16 0-28 12-21 28-12 4-19 14-15 26 3 9 11 14 21 15 1 0 2 0 3-.2L0 88l8-10c1 .2 2 .2 3 .2 10-1 18-6 21-15 4-12-3-22-15-26 7-16-5-28-21-28z"/>
      <path fill="none" stroke="#faf6ee" stroke-width="2.8" stroke-linecap="round" d="M0 -30c-10 0-18 7-13 18M0 -30c10 0 18 7 13 18M0 -12v34M-14 18q14 10 28 0"/>
      <circle cx="0" cy="-18" r="5.5" fill="#faf6ee"/>
      <rect x="-3.5" y="52" width="7" height="10" fill="#faf6ee"/>
    </g>
    <g id="mini-spade">
      <path fill="currentColor" d="M0 -8c-3 0-5 2.5-4 5.5-2 .8-3.5 3-2.8 5.5.7 2 2.5 3.2 4.5 3.3.3 0 .7 0 1-.1L0 24l2.8-3.5c.3.1.7.1 1 .1 2-.1 3.8-1.3 4.5-3.3.7-2.5-.8-4.7-2.8-5.5 1-3-1-5.5-4-5.5z"/>
    </g>
    <g id="mini-heart">
      <path fill="currentColor" d="M0 4c-6-8-14-2-14 6 0 8 14 18 14 18s14-10 14-18c0-8-8-14-14-6z" transform="scale(0.55)"/>
    </g>
    <path id="wordArc" d="M210 842 Q512 770 814 842" fill="none"/>
  </defs>

  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Circular brand rings (gap at bottom for wordmark) -->
  <circle cx="512" cy="410" r="352" stroke="#5eb3ff" stroke-width="9" fill="none" stroke-dasharray="1680 520" transform="rotate(90 512 410)"/>
  <circle cx="512" cy="410" r="298" stroke="#e84855" stroke-width="7" fill="none" stroke-dasharray="1420 460" transform="rotate(90 512 410)"/>

  <!-- Fanned background cards -->
  <g>
    <g transform="rotate(-28 292 330)">
      <rect x="236" y="252" width="112" height="158" rx="12" fill="#10131c" stroke="#e84855" stroke-width="5"/>
      <text x="258" y="292" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#e84855">A</text>
      <g transform="translate(292 312) scale(1.3)" color="#e84855"><use href="#mini-heart"/></g>
    </g>
    <g transform="rotate(-14 338 318)">
      <rect x="282" y="240" width="112" height="158" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5"/>
      <text x="304" y="280" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#5eb3ff">A</text>
      <g transform="translate(338 300) scale(1.3)" color="#5eb3ff"><use href="#mini-spade"/></g>
    </g>
    <g transform="rotate(0 384 312)">
      <rect x="328" y="234" width="112" height="158" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5"/>
      <text x="350" y="274" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#5eb3ff">A</text>
      <g transform="translate(384 294) scale(1.3)" color="#5eb3ff"><use href="#mini-spade"/></g>
    </g>
    <g transform="rotate(0 640 312)">
      <rect x="584" y="234" width="112" height="158" rx="12" fill="#10131c" stroke="#e84855" stroke-width="5"/>
      <text x="606" y="274" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#e84855">A</text>
      <g transform="translate(640 294) scale(1.3)" color="#e84855"><use href="#mini-heart"/></g>
    </g>
    <g transform="rotate(14 686 318)">
      <rect x="630" y="240" width="112" height="158" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5"/>
      <text x="652" y="280" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#5eb3ff">A</text>
      <g transform="translate(686 300) scale(1.3)" color="#5eb3ff"><use href="#mini-spade"/></g>
    </g>
    <g transform="rotate(28 732 330)">
      <rect x="676" y="252" width="112" height="158" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5"/>
      <text x="698" y="292" font-family="Arial Black, Arial, sans-serif" font-size="34" font-weight="900" fill="#5eb3ff">A</text>
      <g transform="translate(732 312) scale(1.3)" color="#5eb3ff"><use href="#mini-spade"/></g>
    </g>
  </g>

  <!-- Hero ace of spades -->
  <rect x="332" y="158" width="360" height="492" rx="26" fill="url(#cream)" stroke="#10131c" stroke-width="16"/>
  <rect x="348" y="174" width="328" height="460" rx="20" fill="url(#cardHatch)"/>
  <text x="378" y="236" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#10131c">A</text>
  <g transform="translate(430 214) scale(1.65)" color="#10131c"><use href="#mini-spade"/></g>
  <g transform="translate(512 418) scale(3.45)">
    <use href="#ornate-spade"/>
  </g>

  <!-- BOORAY wordmark base + two-tone type -->
  <path d="M170 900 Q512 930 854 900 L854 940 Q512 970 170 940 Z" fill="#10131c"/>
  <path d="M182 904 Q512 932 842 904 L842 932 Q512 960 182 932 Z" fill="#d4a853"/>
  <text font-family="Arial Black, Impact, Arial, sans-serif" font-size="112" font-weight="900" letter-spacing="8">
    <textPath href="#wordArc" startOffset="50%" text-anchor="middle" fill="none" stroke="#10131c" stroke-width="16">BOORAY</textPath>
  </text>
  <text font-family="Arial Black, Impact, Arial, sans-serif" font-size="112" font-weight="900" letter-spacing="8">
    <textPath href="#wordArc" startOffset="50%" text-anchor="middle" fill="none" stroke="#d4a853" stroke-width="5">BOORAY</textPath>
  </text>
  <text font-family="Arial Black, Impact, Arial, sans-serif" font-size="112" font-weight="900" letter-spacing="8">
    <textPath href="#wordArc" startOffset="50%" text-anchor="middle" fill="url(#textTop)" clip-path="inset(0 0 52% 0)">BOORAY</textPath>
  </text>
  <text font-family="Arial Black, Impact, Arial, sans-serif" font-size="112" font-weight="900" letter-spacing="8">
    <textPath href="#wordArc" startOffset="50%" text-anchor="middle" fill="url(#textBottom)" clip-path="inset(48% 0 0 0)">BOORAY</textPath>
  </text>
</svg>
