<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Table overlay layout fixture</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/table-session.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #0a0e18;
      }
      body.table-play-active {
        overflow: hidden;
      }
    </style>
  </head>
  <body class="table-play-active">
    <div id="table-play-overlay" class="table-play-overlay">
      <header class="table-play-overlay__bar">
        <button type="button" id="close-table-play">← Hand results</button>
        <span class="table-play-overlay__title">Hand #1 · live table</span>
      </header>
      <main class="table-play-overlay__main">
        <div id="table-session-root" class="table-session-root" data-testid="overlay-fixture-root"></div>
      </main>
    </div>
    <script type="module">
      import { mountTableSession } from "/table-session.js";

      const params = new URLSearchParams(window.location.search);
      const playerCount = Math.min(8, Math.max(2, parseInt(params.get("players") || "4", 10)));
      const botCount = Math.min(
        playerCount - 1,
        Math.max(0, parseInt(params.get("bots") || "1", 10)),
      );
      const phaseParam = params.get("phase") || "draw";
      const phase = phaseParam === "enrollment" ? "decision" : phaseParam;
      const decisionMode = phase === "decision";
      const cardsDealt = phase === "reveal" || phase === "decision" || phase === "draw" || phase === "play";

      const ids = Array.from({ length: playerCount }, (_, i) => `p${i}`);
      const dealerId = ids[playerCount - 1];

      const state = {
        selfCommitted: false,
        selfPassed: false,
        actionFeedback: null,
      };

      function isBot(id) {
        const idx = parseInt(id.slice(1), 10);
        return idx > 0 && idx <= botCount;
      }

      function displayName(id) {
        const idx = parseInt(id.slice(1), 10);
        return isBot(id) ? `Bot ${idx}` : `Player ${idx}`;
      }

      function selfNeedsDecision() {
        return decisionMode && !state.selfCommitted && !state.selfPassed;
      }

      function buildPlayers() {
        const onClock = selfNeedsDecision();
        return ids.map((id) => {
          const isSelf = id === "p0";
          const satOut = state.selfPassed && isSelf;
          const inHand = cardsDealt && !satOut;
          return {
            playerId: id,
            displayName: displayName(id),
            handsWon: 0,
            inHand,
            tricksThisHand: 0,
            isSelf,
            isDealer: id === dealerId,
            isLeading: false,
            isWinner: false,
            isRobot: isBot(id),
            enrollmentJoined: state.selfCommitted && isSelf,
            enrollmentSatOut: satOut,
            canToggleInHand: onClock && isSelf,
            canPassEnrollment: onClock && isSelf,
            canEditTricks: false,
            showHoleCards: phase === "play" && id !== "p0",
            holeCardCount: phase === "play" ? 4 : 0,
            isOnTurn: phase === "draw" && id === "p0",
          };
        });
      }

      const heroCards = cardsDealt
        ? [
            { rank: "A", suit: "spades" },
            { rank: "K", suit: "hearts" },
            { rank: "Q", suit: "diamonds" },
            { rank: "J", suit: "clubs" },
            { rank: "10", suit: "spades" },
          ]
        : [];

      const root = document.getElementById("table-session-root");

      function renderFixture() {
        mountTableSession(root, {
          session: {
            sessionId: "overlay-fixture",
            handNumber: 1,
            handStake: 1,
            carryOverPot: 0,
            isFinal: false,
            dealerId,
            trumpHolderId: dealerId,
            participantIds: cardsDealt ? ids : [],
            tricksByPlayer: {},
            phase: cardsDealt ? phase : null,
            trumpSuit: cardsDealt ? "hearts" : null,
            trumpUpcard: cardsDealt ? { rank: "7", suit: "hearts" } : null,
            turnPlayerId: cardsDealt ? "p0" : null,
            remainingDeckCount: cardsDealt ? 28 : null,
            maxDrawDiscards: 4,
            handEnrollment: decisionMode
              ? {
                  active: true,
                  orderedPlayerIds: ids,
                  enrolledIds: state.selfCommitted ? ["p0"] : [],
                  declinedIds: state.selfPassed ? ["p0"] : [],
                  currentIndex: state.selfCommitted || state.selfPassed ? 1 : 0,
                }
              : null,
          },
          players: buildPlayers(),
          potMetrics: {
            anteAmount: 1,
            potCap: 20,
            currentPot: playerCount,
            maxWinThisHand: playerCount,
            limEnabled: false,
            overflow: 0,
          },
          mySessionNet: 0,
          myHandContribution: 1,
          leaderLabel: decisionMode
            ? state.selfCommitted
              ? "Waiting for other players"
              : "Your turn — play or pass (18s)"
            : "Trump Hearts · draw round",
          showCoWinSettlement: false,
          enrollmentActive: decisionMode,
          currentUserId: "p0",
          heroCards,
          privateHandReady: cardsDealt,
          legalPlayIndices: null,
          actionFeedback: state.actionFeedback,
          actions: {
            onToggleInHand: (inHand) => {
              if (!decisionMode) return;
              if (inHand) state.selfCommitted = true;
              else state.selfPassed = true;
              state.actionFeedback = {
                status: "success",
                message: inHand ? "You're in this hand." : "You passed this hand.",
              };
              renderFixture();
            },
            onPassEnrollment: () => {
              state.selfPassed = true;
              state.actionFeedback = { status: "success", message: "You passed this hand." };
              renderFixture();
            },
            onDecisionPlay: (discardCount) => {
              state.selfCommitted = true;
              state.actionFeedback = {
                status: "success",
                message:
                  discardCount > 0
                    ? `You're in — draw ${discardCount}`
                    : "You're in — standing pat",
              };
              renderFixture();
            },
            onTrickDelta: () => {},
            onSettle: () => {},
            onSubmitDraw: async () => {},
            onPassDraw: async () => {},
            onPlayCard: async () => {},
          },
        });
      }

      renderFixture();
    </script>
  </body>
</html>
