<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table audio fixture</title>
  </head>
  <body>
    <div id="audio-fixture-root" data-testid="audio-fixture-root" style="min-height: 1px"></div>
    <script type="module">
      import {
        initGameFeedback,
        playBourreFeedback,
        playCardSelectFeedback,
        playDrawFeedback,
        playFoldFeedback,
        playGameStartFeedback,
        playOpenRoomFeedback,
        playPotWinFeedback,
        playIllegalActionFeedback,
        playUiButtonFeedback,
        playShuffleFeedback,
        playAnimationSound,
        playActionSound,
        unlockAudio,
        getTableAudioAudit,
        resetTableAudioAudit,
        resetAudioPlayMonitor,
        resetSoundAssetCache,
        getAudioPlayMonitor,
      } from "/table-session.js";

      initGameFeedback();

      async function unlockAudioForTest() {
        document.body.click();
        await unlockAudio();
        await new Promise((r) => setTimeout(r, 80));
      }

      async function waitForAudit(event, expectedFilename, timeoutMs = 3000) {
        const start = Date.now();
        while (Date.now() - start < timeoutMs) {
          const rows = getTableAudioAudit?.() ?? [];
          const match = rows.find(
            (row) =>
              row.event === event &&
              row.filename === expectedFilename &&
              row.result === "asset-played",
          );
          if (match) return match;
          await new Promise((r) => setTimeout(r, 40));
        }
        return null;
      }

      window.__nblTableAudioTest = {
        unlock: unlockAudioForTest,
        reset: () => {
          resetTableAudioAudit?.();
          resetAudioPlayMonitor?.();
          resetSoundAssetCache?.();
        },
        getAudit: () => getTableAudioAudit?.() ?? [],
        getPlayMonitor: () => getAudioPlayMonitor?.() ?? [],
        waitForAudit,
        playCardSelect: () => playCardSelectFeedback(),
        playDraw: () => playDrawFeedback(),
        playFold: () => playFoldFeedback(),
        playGameStart: () => playGameStartFeedback(),
        playOpenRoom: () => playOpenRoomFeedback(),
        playPotWin: () => playPotWinFeedback(),
        playBourre: () => playBourreFeedback(),
        playIllegal: () => playIllegalActionFeedback(),
        playUiButton: () => playUiButtonFeedback(),
        playShuffle: () => playShuffleFeedback({ delayMs: 0 }),
        playCardPlace: () =>
          playAnimationSound("cardPlace", { intensityTier: 0 }, { action: "card-land", source: "fixture" }),
        playLeadChange: () =>
          playAnimationSound("leadChange", { intensityTier: 0 }, { action: "take-lead", source: "fixture" }),
        playTrickWin: () =>
          playAnimationSound(
            "trickWin",
            { isLocalPlayer: true, volumeScale: 1.08 },
            { action: "trick-won", source: "fixture" },
          ),
        playTrickCollect: () =>
          playAnimationSound("trickCollect", {}, { action: "trick-collect", source: "fixture" }),
      };
    </script>
  </body>
</html>
