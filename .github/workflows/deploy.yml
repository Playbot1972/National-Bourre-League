name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Firebase secrets are configured
        id: cfg
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          missing=""
          for name in PROJECT_ID API_KEY AUTH_DOMAIN APP_ID SERVICE_ACCOUNT; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              missing="$missing FIREBASE_${name}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Firebase deploy blocked — missing GitHub Actions secrets:$missing"
            echo "Add them at Settings → Secrets and variables → Actions, then re-run this workflow."
            echo "Or deploy from your machine: npm run deploy (after firebase login)."
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.cfg.outputs.ready == 'true'
        run: npm ci

      - name: Write production Firebase config
        if: steps.cfg.outputs.ready == 'true'
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: node scripts/write-firebase-config.js

      - name: Build hosting bundle
        if: steps.cfg.outputs.ready == 'true'
        run: npm run build:hosting

      - name: Authenticate to Google Cloud
        if: steps.cfg.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting + Firestore rules
        if: steps.cfg.outputs.ready == 'true'
        run: npx firebase deploy --only hosting,firestore:rules --project "${{ secrets.FIREBASE_PROJECT_ID }}"
