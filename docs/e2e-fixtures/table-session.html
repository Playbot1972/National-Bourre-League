<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Table session fixture</title>
    <link rel="stylesheet" href="/table-session.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0e18;
        width: 100%;
        max-width: 100vw;
        min-height: 100dvh;
        overflow-x: clip;
        touch-action: manipulation;
      }
      .fixture-shell {
        min-height: 100dvh;
        width: 100%;
        max-width: 100%;
        display: flex;
        flex-direction: column;
        padding: max(8px, env(safe-area-inset-top, 0px))
          max(8px, env(safe-area-inset-right, 0px))
          max(8px, env(safe-area-inset-bottom, 0px))
          max(8px, env(safe-area-inset-left, 0px));
        box-sizing: border-box;
        overflow-x: clip;
      }
      /* Mirror production overlay shell so stage-fit gets real dimensions. */
      #table-root {
        flex: 1;
        min-height: 0;
        width: 100%;
        max-width: 100%;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div class="fixture-shell">
      <div id="table-root" data-testid="table-session-fixture"></div>
    </div>
    <script type="module">
      import { mountTableSession } from "/table-session.js";

      const params = new URLSearchParams(window.location.search);
      const playerCount = Math.min(8, Math.max(2, parseInt(params.get("players") || "4", 10)));
      const botCount = Math.min(
        playerCount - 1,
        Math.max(0, parseInt(params.get("bots") || "0", 10)),
      );
      const phaseParam = params.get("phase") || "decision";
      /** Pagat flow: legacy `enrollment` maps to post-deal decision. */
      const phase = phaseParam === "enrollment" ? "decision" : phaseParam;
      const tick = params.get("tick") !== "0";

      let actionFeedback = null;
      let selfCommitted = false;
      let selfPassed = false;
      /** @type {{ index: number, at: number }[]} */
      window.__fixturePlayLog = [];

      const HAND_DECISION_MS = 12_000;
      const deadlineStart = Date.now() + HAND_DECISION_MS;

      const ids = Array.from({ length: playerCount }, (_, i) => `p${i}`);
      const dealerId = ids[playerCount - 1];
      const ordered = [...ids.slice(1), ids[0]];
      const currentId = ids[0];
      const currentIndex = ordered.indexOf(currentId);

      const cardsDealt = phase === "reveal" || phase === "decision" || phase === "draw" || phase === "play";

      function isBot(id) {
        const idx = parseInt(id.slice(1), 10);
        return idx > 0 && idx <= botCount;
      }

      function displayName(id) {
        const idx = parseInt(id.slice(1), 10);
        return isBot(id) ? `Bot ${idx}` : `Player ${idx}`;
      }

      function selfNeedsDecision() {
        return phase === "decision" && !selfCommitted && !selfPassed;
      }

      function buildPlayers(nowMs) {
        const msLeft = Math.max(0, deadlineStart - nowMs);
        const secLeft = Math.max(0, Math.ceil(msLeft / 1000));
        const fraction = msLeft / HAND_DECISION_MS;
        const onDecisionClock = selfNeedsDecision();

        return ids.map((id) => {
          const isSelf = id === "p0";
          const satOut = selfPassed && isSelf;
          const inHand = cardsDealt && !satOut;
          return {
            playerId: id,
            displayName: displayName(id),
            handsWon: 0,
            bankroll: 100,
            apeScore: isBot(id) ? undefined : 42,
            apeClass: isBot(id) ? undefined : "Chimp",
            apeStatus: isBot(id) ? undefined : "Rising",
            sessionStreak: isBot(id) ? 0 : 2,
            inHand,
            tricksThisHand: phase === "play" ? (id === "p1" ? 1 : 0) : 0,
            isSelf,
            isDealer: id === dealerId,
            isLeading: false,
            isWinner: false,
            isRobot: isBot(id),
            enrollmentOnClock: onDecisionClock && isSelf,
            enrollmentTimeLeft: onDecisionClock && isSelf ? fraction : undefined,
            enrollmentSecondsOnClock: onDecisionClock && isSelf ? secLeft : undefined,
            enrollmentJoined: selfCommitted && isSelf,
            enrollmentSatOut: satOut,
            canToggleInHand: onDecisionClock && isSelf,
            canPassEnrollment: onDecisionClock && isSelf,
            canEditTricks: false,
            showHoleCards: (phase === "draw" || phase === "play") && !isSelf && inHand,
            holeCardCount: phase === "draw" || phase === "play" ? 4 : 0,
            isOnTurn: phase === "draw" && id === "p0",
          };
        });
      }

      const heroCards = cardsDealt
        ? [
            { rank: "A", suit: "spades" },
            { rank: "K", suit: "hearts" },
            { rank: "Q", suit: "diamonds" },
            { rank: "J", suit: "clubs" },
            { rank: "10", suit: "spades" },
          ]
        : [];

      function buildProps(nowMs = Date.now()) {
        const secLeft = Math.max(0, Math.ceil((deadlineStart - nowMs) / 1000));
        const session = {
          sessionId: "fixture-session",
          handNumber: 1,
          handStake: 1,
          carryOverPot: 0,
          isFinal: false,
          dealerId,
          trumpHolderId: dealerId,
          participantIds: cardsDealt ? ids : [],
          tricksByPlayer: phase === "play" ? { p0: 0, p1: 1 } : {},
          phase: cardsDealt ? phase : null,
          trumpSuit: cardsDealt ? "hearts" : null,
          trumpUpcard: cardsDealt ? { rank: "7", suit: "hearts" } : null,
          turnPlayerId: phase === "draw" ? "p0" : phase === "play" ? "p0" : null,
          remainingDeckCount: phase === "draw" ? 28 : null,
          maxDrawDiscards: 4,
          handEnrollment:
            phase === "decision"
              ? {
                  active: true,
                  orderedPlayerIds: ordered,
                  currentIndex: selfCommitted || selfPassed ? 1 : currentIndex,
                  turnDeadlineMs: deadlineStart,
                  enrolledIds: selfCommitted ? ["p0"] : [],
                  declinedIds: selfPassed ? ["p0"] : [],
                }
              : null,
        };

        return {
          session,
          players: buildPlayers(nowMs),
          potMetrics: {
            anteAmount: 1,
            potCap: 20,
            currentPot: playerCount,
            maxWinThisHand: playerCount,
            limEnabled: false,
            overflow: 0,
          },
          mySessionNet: 0,
          myHandContribution: 1,
          leaderLabel:
            phase === "decision"
              ? selfNeedsDecision()
                ? `Your turn — play or pass (${secLeft}s)`
                : "Waiting for other players"
              : phase === "reveal"
                ? "Trump revealed — reviewing hand"
                : phase === "draw"
                  ? "Trump Hearts · draw round"
                  : phase === "play"
                    ? "Trump Hearts · play phase"
                    : "Waiting to deal",
          showCoWinSettlement: false,
          enrollmentActive: phase === "decision",
          enrollmentSecondsLeft: phase === "decision" ? secLeft : 0,
          currentUserId: "p0",
          heroCards,
          privateHandReady: cardsDealt,
          legalPlayIndices: phase === "play" ? [0, 1, 2] : null,
          actionFeedback,
          actions: {
            onToggleInHand: (inHand) => {
              if (inHand) {
                selfCommitted = true;
                actionFeedback = { status: "success", message: "You're in this hand." };
              } else {
                selfPassed = true;
                actionFeedback = { status: "success", message: "You passed this hand." };
              }
              render();
            },
            onPassEnrollment: () => {
              selfPassed = true;
              actionFeedback = { status: "success", message: "You passed this hand." };
              render();
            },
            onDecisionPlay: (discardCount) => {
              selfCommitted = true;
              actionFeedback = {
                status: "success",
                message:
                  discardCount > 0
                    ? `You're in — draw ${discardCount}`
                    : "You're in — standing pat",
              };
              render();
            },
            onTrickDelta: () => {},
            onSettle: () => {},
            onSubmitDraw: async () => {
              actionFeedback = { status: "success", message: "Drew 0 replacement card(s)" };
              render();
            },
            onPassDraw: async () => {
              actionFeedback = { status: "success", message: "Standing pat" };
              render();
            },
            onPlayCard: async (cardIndex) => {
              window.__fixturePlayLog.push({ index: cardIndex, at: Date.now() });
              actionFeedback = { status: "success", message: "Card played" };
              render();
            },
          },
        };
      }

      const root = document.getElementById("table-root");
      root.dataset.playerCount = String(playerCount);
      root.dataset.botCount = String(botCount);
      root.dataset.phase = phase;

      function render(nowMs) {
        mountTableSession(root, buildProps(nowMs));
      }

      render();
      if (tick && phase === "decision") {
        setInterval(() => render(Date.now()), 1000);
      }
    </script>
  </body>
</html>
