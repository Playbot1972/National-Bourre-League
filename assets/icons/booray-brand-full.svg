<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none" role="img" aria-label="Booray brand mark">
  <defs>
    <linearGradient id="bg" x1="128" y1="80" x2="896" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141a2e"/>
      <stop offset="0.5" stop-color="#0a0e18"/>
      <stop offset="1" stop-color="#04060c"/>
    </linearGradient>
    <linearGradient id="cream" x1="512" y1="180" x2="512" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#faf6ee"/>
      <stop offset="1" stop-color="#e5dac8"/>
    </linearGradient>
    <linearGradient id="textTop" x1="512" y1="700" x2="512" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="textBottom" x1="512" y1="780" x2="512" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4a853"/>
      <stop offset="1" stop-color="#a67c2a"/>
    </linearGradient>
    <path id="wordArc" d="M220 820 Q512 760 804 820" fill="none"/>
  </defs>
  <rect width="1024" height="1024" rx="48" fill="url(#bg)"/>
  <!-- Ghosted background cards -->
  <g opacity="0.06" fill="#f3ece0">
    <rect x="80" y="120" width="90" height="130" rx="10" transform="rotate(-25 125 185)"/>
    <rect x="860" y="90" width="90" height="130" rx="10" transform="rotate(20 905 155)"/>
    <rect x="120" y="780" width="90" height="130" rx="10" transform="rotate(15 165 845)"/>
    <rect x="820" y="760" width="90" height="130" rx="10" transform="rotate(-18 865 825)"/>
  </g>
  <!-- Brand arcs -->
  <circle cx="512" cy="430" r="340" stroke="#5eb3ff" stroke-width="8" fill="none" stroke-opacity="0.55" stroke-dasharray="680 360"/>
  <circle cx="512" cy="430" r="290" stroke="#e84855" stroke-width="6" fill="none" stroke-opacity="0.5" stroke-dasharray="580 300"/>
  <!-- Fan cards behind ace -->
  <g opacity="0.95">
    <rect x="250" y="250" width="110" height="155" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5" transform="rotate(-28 305 327)"/>
    <rect x="290" y="240" width="110" height="155" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5" transform="rotate(-14 345 317)"/>
    <rect x="330" y="235" width="110" height="155" rx="12" fill="#10131c" stroke="#e84855" stroke-width="5" transform="rotate(2 385 312)"/>
    <rect x="584" y="235" width="110" height="155" rx="12" fill="#10131c" stroke="#e84855" stroke-width="5" transform="rotate(-2 639 312)"/>
    <rect x="624" y="240" width="110" height="155" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5" transform="rotate(14 679 317)"/>
    <rect x="664" y="250" width="110" height="155" rx="12" fill="#10131c" stroke="#5eb3ff" stroke-width="5" transform="rotate(28 719 327)"/>
  </g>
  <!-- Central ace card -->
  <rect x="332" y="170" width="360" height="480" rx="26" fill="url(#cream)" stroke="#10131c" stroke-width="14"/>
  <text x="378" y="248" font-family="Arial Black, Arial, sans-serif" font-size="64" font-weight="900" fill="#10131c">A</text>
  <path fill="#10131c" transform="translate(430 228) scale(1.6)" d="M0 -8c-3 0-5 2.5-4 5.5-2 .8-3.5 3-2.8 5.5.7 2 2.5 3.2 4.5 3.3.3 0 .7 0 1-.1L0 24l2.8-3.5c.3.1.7.1 1 .1 2-.1 3.8-1.3 4.5-3.3.7-2.5-.8-4.7-2.8-5.5 1-3-1-5.5-4-5.5z"/>
  <g transform="translate(512 430) scale(3.4)">
    <path fill="#10131c" d="M0 -42c-16 0-28 12-21 28-12 4-19 14-15 26 3 9 11 14 21 15 1 0 2 0 3-.2L0 88l8-10c1 .2 2 .2 3 .2 10-1 18-6 21-15 4-12-3-22-15-26 7-16-5-28-21-28z"/>
    <path fill="none" stroke="#faf6ee" stroke-width="2.8" stroke-linecap="round" d="M0 -30c-10 0-18 7-13 18M0 -30c10 0 18 7 13 18M0 -12v34M-14 18q14 10 28 0"/>
    <circle cx="0" cy="-18" r="5.5" fill="#faf6ee"/>
    <rect x="-3.5" y="52" width="7" height="10" fill="#faf6ee"/>
  </g>
  <!-- BOORAY two-tone wordmark -->
  <text x="512" y="820" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-size="108" font-weight="900" fill="none" stroke="#10131c" stroke-width="14" letter-spacing="6">BOORAY</text>
  <text x="512" y="820" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-size="108" font-weight="900" fill="none" stroke="#d4a853" stroke-width="4" letter-spacing="6">BOORAY</text>
  <text x="512" y="820" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-size="108" font-weight="900" fill="url(#textTop)" letter-spacing="6" clip-path="inset(0 0 50% 0)">BOORAY</text>
  <text x="512" y="820" text-anchor="middle" font-family="Arial Black, Impact, Arial, sans-serif" font-size="108" font-weight="900" fill="url(#textBottom)" letter-spacing="6" clip-path="inset(50% 0 0 0)">BOORAY</text>
</svg>
