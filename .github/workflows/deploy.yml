name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - name: Check Firebase secrets are configured
        id: cfg
        env:
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          missing=""
          for name in PROJECT_ID API_KEY AUTH_DOMAIN APP_ID SERVICE_ACCOUNT; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              missing="$missing FIREBASE_${name}"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Firebase deploy blocked — missing GitHub Actions secrets:$missing"
            echo "Add them at Settings → Secrets and variables → Actions, then re-run this workflow."
            echo "Or deploy locally: copy .env.firebase.example → .env.firebase, then npm run deploy"
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.cfg.outputs.ready == 'true'
        run: npm ci

      - name: Install Cloud Functions dependencies
        if: steps.cfg.outputs.ready == 'true'
        run: npm ci --prefix functions --omit=dev

      - name: Bump app version
        if: steps.cfg.outputs.ready == 'true'
        id: version
        env:
          BUILD_CHANNEL: production
        run: |
          node scripts/bump-version.js
          echo "version=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")" >> "$GITHUB_OUTPUT"

      - name: Write production Firebase config
        if: steps.cfg.outputs.ready == 'true'
        env:
          BUILD_CHANNEL: production
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: node scripts/write-firebase-config.js

      - name: Build hosting bundle
        if: steps.cfg.outputs.ready == 'true'
        env:
          BUILD_CHANNEL: production
        run: npm run build:hosting

      - name: Build Cloud Functions bundle
        if: steps.cfg.outputs.ready == 'true'
        run: npm run build:functions

      - name: Authenticate to Google Cloud
        if: steps.cfg.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting
        if: steps.cfg.outputs.ready == 'true'
        run: npx firebase deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Deploy Firestore rules
        if: steps.cfg.outputs.ready == 'true'
        run: npx firebase deploy --only firestore:rules --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Deploy Cloud Functions
        if: steps.cfg.outputs.ready == 'true'
        run: npx firebase deploy --only functions --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Commit version bump
        if: steps.cfg.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json docs/version.js src/version.ts
          git diff --staged --quiet && exit 0
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push
